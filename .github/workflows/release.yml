name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'Keep Awake/Keep Awake.csproj'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Read version from project
        id: ver
        shell: pwsh
        run: |
          $xml = [xml](Get-Content "Keep Awake/Keep Awake.csproj")
          $v   = @($xml.Project.PropertyGroup) |
                   ForEach-Object { $_.Version } |
                   Where-Object   { $_ } |
                   Select-Object  -First 1
          "sem=$v"  >> $env:GITHUB_OUTPUT
          "tag=v$v" >> $env:GITHUB_OUTPUT

      - name: Publish EXE (self-contained, x64)
        shell: pwsh
        run: |
          dotnet publish "Keep Awake/Keep Awake.csproj" `
            -c Release --self-contained true `
            -o "installer/publish"

      - name: Build installer (.exe)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ steps.ver.outputs.sem }}" `
            "installer\KeepAwake.iss"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Keep Awake ${{ steps.ver.outputs.sem }}
          body: |
            ## Installation

            Download **KeepAwake-Setup-${{ steps.ver.outputs.sem }}.exe** and run it.

            No administrator access required — the app installs for the current user only.

            To uninstall, go to **Settings → Apps → Keep Awake → Uninstall**.
          files: |
            installer/output/KeepAwake-Setup-${{ steps.ver.outputs.sem }}.exe
